<link rel="stylesheet" href="/assets/style.css">
<style>
.menu { text-align:center; padding:2rem 0; }
.menu-btn { display:block; width:100%;max-width:360px; margin:1rem auto; padding:1.2rem 2rem;
  background:var(--bg-card); border:1px solid var(--border); border-radius:12px;
  color:var(--text); font-size:1.1rem; cursor:pointer; transition:all .2s; text-decoration:none; }

.back { display:block; text-align:center; color:var(--text-dim); font-size:.85rem; margin-top:2rem; text-decoration:none; }
.back:hover { color:var(--accent); }
.progress-bar { max-width:360px; margin:1.5rem auto; }
.progress-bar .track { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.progress-bar .fill { height:100%; background:var(--accent); border-radius:2px; width:100%; }
.progress-bar .label { display:flex; justify-content:space-between; font-size:.75rem; color:var(--text-dim); margin-top:.3rem; }
</style>
</head>
