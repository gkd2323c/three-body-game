<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>三体II·黑暗森林 · 互动文游</title>
<link rel="stylesheet" href="/assets/style.css">
<style>
.menu { text-align:center; padding:2rem 0; }
.menu-btn { display:block; width:100%;max-width:360px; margin:1rem auto; padding:1.2rem 2rem;
  background:var(--bg-card); border:1px solid var(--border); border-radius:12px;
  color:var(--text); font-size:1.1rem; cursor:pointer; transition:all .2s; text-decoration:none; }
.menu-btn:hover { background:var(--bg-hover); border-color:var(--accent); transform:translateY(-2px); }
.menu-btn .sub { display:block; font-size:.8rem; color:var(--text-dim); margin-top:.3rem; }
.menu-btn.disabled { opacity:.5; cursor:default; }
.menu-btn.disabled:hover { background:var(--bg-card); border-color:var(--border); transform:none; }
.back { display:block; text-align:center; color:var(--text-dim); font-size:.85rem; margin-top:2rem; text-decoration:none; }
.back:hover { color:var(--accent); }
</style>
</head>

<div class="container">
<header>
  <h1>黑暗森林</h1>
  <p class="subtitle">第二部 · 面壁者</p>
</header>
<div class="tagline">宇宙就是一座黑暗森林，每个文明都是带枪的猎人。</div>
<div class="menu">

    <span class="sub">第一部已完成 · 第二部即将开始</span>
  </div>
</div>
<a href="/" class="back">← 返回系列入口</a>
</div>
</body>
