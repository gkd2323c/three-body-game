<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>三体 · 互动文游</title>
<link rel="stylesheet" href="/assets/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>">
<style>
.game-grid { display:grid; gap:1.5rem; margin:2rem 0; }
.game-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:16px;
  padding:2rem; transition:all .2s; cursor:pointer; text-decoration:none; color:inherit;
}
.game-card:hover { background:var(--bg-hover); border-color:var(--accent); transform:translateY(-3px); }
.game-card .num { font-size:.8rem; color:var(--text-dim); font-family:var(--font-mono); }
.game-card .title { font-size:1.4rem; font-weight:700; margin:.3rem 0; }
.game-card .tagline { font-style:italic; color:var(--text-dim); font-size:.9rem; }
.game-card .meta { font-size:.8rem; color:var(--text-dim); margin-top:.5rem; }
.game-card .status-badge {
  display:inline-block; padding:.15rem .6rem; border-radius:4px;
  font-size:.75rem; font-weight:500; margin-top:.6rem;
}
.badge-done { background:#1a3a1a; color:#6f6; }
.badge-wip { background:#3a351a; color:#ff6; }
.badge-soon { background:#2a1a3a; color:#a6f; }
</style>
</head>
<body>
<div class="container">
<header>
  <h1>三体 · 互动文游</h1>
  <p class="subtitle">分支剧情 · 沉浸叙事 · 改编自刘慈欣三部曲</p>
</header>
<div class="tagline">"给岁月以文明，而不是给文明以岁月"</div>
<div class="game-grid">
  <a href="/three-body-1/" class="game-card">
    <div class="num">第一部</div>
    <div class="title">三体</div>
    <div class="tagline">一切都会逝去，只有死神永生。</div>
    <div class="meta">210 节点 · 8 个结局 · 15 个成就</div>
    <span class="status-badge badge-done">✅ 可游玩</span>
  </a>
  <a href="/three-body-2/" class="game-card">
    <div class="num">第二部</div>
    <div class="title">黑暗森林</div>
    <div class="tagline">宇宙就是一座黑暗森林，每个文明都是带枪的猎人。</div>
    <div class="meta">317 节点 · 8 个结局 · 10 个成就</div>
    <span class="status-badge badge-done">✅ 可游玩</span>
  </a>
  <a href="/three-body-3/" class="game-card">
    <div class="num">第三部</div>
    <div class="title">死神永生</div>
    <div class="tagline">给时光以生命，而不是给生命以时光。</div>
    <div class="meta">改编规划中</div>
    <span class="status-badge badge-soon">📅 待定</span>
  </a>
</div>
<footer>
  <p>改编内容 <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/">CC BY-NC-SA 4.0</a> · 原著版权归刘慈欣所有</p>
  <p>游戏引擎 by <a href="https://github.com/Shanyin-ai/Story-to-game">@山音</a> · <a href="https://github.com/gkd2323c/three-body-game">GitHub</a></p>
</footer>
</div>
</body>
</html>
